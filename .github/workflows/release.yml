# -------------------------------------------------------------
# Publish to npm when a version tag (v*) is pushed
# -------------------------------------------------------------
#
# Trigger: git push origin main --tags  (after npm run bump)
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
# Configure on npmjs.com → package settings → Trusted Publishers

name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  id-token: write       # OIDC token for npm trusted publishing
  contents: write       # to create GitHub release

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure @sterfive registry
        run: |
          echo "@sterfive:registry=https://npm-registry.sterfive.fr" >> .npmrc
          if [ -n "${{ secrets.NPM_STERFIVE_TOKEN }}" ]; then
            echo "//npm-registry.sterfive.fr/:_authToken=${{ secrets.NPM_STERFIVE_TOKEN }}" >> .npmrc
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Publish all packages
        run: |
          for pkg in core opcua-connector pseudo-session-connector rest-server app demo-embedded; do
            echo "📦 Publishing @node-i3x/$pkg..."
            npm publish -w "packages/$pkg" --access public --provenance || true
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --latest
