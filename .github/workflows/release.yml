# -------------------------------------------------------------
# Publish to npm when a version tag (v*) is pushed
# -------------------------------------------------------------
#
# Uses npm Trusted Publishing (OIDC) — no NPM_TOKEN needed.
# Each @node-i3x/* package must have a Trusted Publisher
# configured on npmjs.com → release.yml

name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  ci:
    permissions:
      contents: read
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  publish:
    name: Publish to npm
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write     # OIDC token for npm trusted publishing
      contents: write     # GitHub release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure registries
        run: |
          # npm trusted publishing: set registry without auth token
          npm config set registry https://registry.npmjs.org/

          # @sterfive scoped registry (for install only)
          echo "@sterfive:registry=https://npm-registry.sterfive.fr" >> .npmrc
          if [ -n "${{ secrets.NPM_STERFIVE_TOKEN }}" ]; then
            echo "//npm-registry.sterfive.fr/:_authToken=${{ secrets.NPM_STERFIVE_TOKEN }}" >> .npmrc
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Publish all packages
        run: |
          for pkg in core opcua-connector pseudo-session-connector rest-server app demo-embedded; do
            echo "📦 Publishing @node-i3x/$pkg..."
            npm publish -w "packages/$pkg" --access public --provenance
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME}
          gh release create "$VERSION" \
            --title "$VERSION" \
            --generate-notes \
            --latest 2>/dev/null || \
          gh release edit "$VERSION" \
            --title "$VERSION" \
            --latest

