# -------------------------------------------------------------
# node-i3x - Automated release with Changesets
# -------------------------------------------------------------
#
# Uses npm Trusted Publishing (OIDC) - no NPM_TOKEN needed.
# Configure on npmjs.com: package settings -> Trusted Publishers
#   -> Provider: GitHub Actions
#   -> Repository: node-opcua/node-i3x
#   -> Workflow: release.yml
#
# How it works:
#   1. Developers add changesets: `npm run changeset`
#   2. On merge to main, the workflow either:
#      a) Opens/updates a "Version Packages" PR
#      b) If that PR is merged, publishes to npm with provenance

name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

# Serialize publishes: never run two at once, and never cancel
# an in-flight one (partial publishes are hard to recover from).
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  id-token: write       # OIDC token for npm trusted publishing
  contents: write       # to push version commits & tags
  pull-requests: write  # to create/update the "Version Packages" PR

jobs:
  release:
    name: Version & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changeset detection

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure @sterfive registry
        run: |
          echo "@sterfive:registry=https://npm-registry.sterfive.fr" >> .npmrc
          if [ -n "${{ secrets.NPM_STERFIVE_TOKEN }}" ]; then
            echo "//npm-registry.sterfive.fr/:_authToken=${{ secrets.NPM_STERFIVE_TOKEN }}" >> .npmrc
          fi

      - name: Install dependencies
        run: npm ci

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: version packages"
          commit: "chore: version packages"
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag release
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Published packages:"
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq '.'
          VERSION=$(node -p "require('./packages/core/package.json').version")
          git tag "v${VERSION}" || true
          git push origin "v${VERSION}" || true
