# i3X configuration
# See: npx @node-i3x/app --help

# OPC UA server to connect to
endpoint: opc.tcp://localhost:4840

# REST API settings
port: 8080
host: 0.0.0.0

# OPC UA security
securityMode: None
# optimizedClient: auto

# OPC UA subscription intervals (milliseconds)
publishIntervalMs: 1000
samplingIntervalMs: 250

# Model preloading
preload: true
# preloadStrict: false

# Logging
logLevel: info
