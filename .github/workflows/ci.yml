# -------------------------------------------------------------
# node-i3x - GitHub Actions CI/CD pipeline
# -------------------------------------------------------------

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    secrets:
      NPM_STERFIVE_TOKEN:
        required: false

env:
  NODE_ENV: development

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure @sterfive registry
        run: |
          echo "@sterfive:registry=https://npm-registry.sterfive.fr" >> .npmrc
          if [ -n "${{ secrets.NPM_STERFIVE_TOKEN }}" ]; then
            echo "//npm-registry.sterfive.fr/:_authToken=${{ secrets.NPM_STERFIVE_TOKEN }}" >> .npmrc
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Lint and Type Check (Concurrent)
        run: |
          npx biome check . &
          PID_LINT=$!
          npm run typecheck &
          PID_TYPECHECK=$!
          
          wait $PID_LINT
          EXIT_LINT=$?
          wait $PID_TYPECHECK
          EXIT_TYPECHECK=$?
          
          if [ $EXIT_LINT -ne 0 ] || [ $EXIT_TYPECHECK -ne 0 ]; then
            echo "Lint or Typecheck failed"
            exit 1
          fi

      - name: Run tests with coverage
        run: npm run coverage

      - name: Upload coverage to Coveralls
        if: success() && github.event_name != 'pull_request'
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Remove @sterfive/opcua-optimized-client
        run: |
          echo "-- Removing @sterfive/opcua-optimized-client --"
          npm ls @sterfive/opcua-optimized-client 2>/dev/null && npm rm @sterfive/opcua-optimized-client || echo "Not installed - good"
          ! node -e "require.resolve('@sterfive/opcua-optimized-client')" 2>/dev/null || (echo 'FAIL: package still resolvable' && exit 1)

      - name: Run tests without optimized client
        run: npm test
